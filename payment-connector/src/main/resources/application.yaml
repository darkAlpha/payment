spring:
  application:
    name: payment-connector
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

dubbo:
  application:
    logger: slf4j
    name: PaymentGatewayApplication
  registry:
    address: zookeeper://${zookeeper.address:127.0.0.1}:2181
  protocol:
    name: tri
    port: 50051
  consumer:
    loadbalance: roundrobin

# Payment platform configuration
payment:
  security:
    jwt:
      secret: ${JWT_SECRET:defaultSecretKeyForDevMustBeAtLeast256BitsLongForHS256Algorithm}
      expiration-ms: 3600000
  cache:
    provider: caffeine
  idempotency:
    store: redis

server:
  port: 8080

logging:
  level:
    org.tars: INFO
    org.tars.core.security: DEBUG
