server:
  port: 8080

spring:
  application:
    name: payment-gateway
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, payment-gateway
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET,POST
            backoff:
              firstBackoff: 100ms
              maxBackoff: 5000ms
              factor: 2
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # ---- Deposit Service ----
        - id: deposit-service
          uri: http://localhost:8081          # direct URL (no service discovery)
          predicates:
            - Path=/api/v1/deposits/**
          filters:
            - name: CircuitBreaker
              args:
                name: deposit-cb
                fallbackUri: forward:/fallback/deposit
          metadata:
            required-roles: OPERATOR,ADMIN,SERVICE

        # ---- Transfer Service ----
        - id: transfer-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/transfers/**
          filters:
            - name: CircuitBreaker
              args:
                name: transfer-cb
          metadata:
            required-roles: OPERATOR,ADMIN,SERVICE

        # ---- Account Service ----
        - id: account-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/accounts/**
          metadata:
            required-roles: OPERATOR,ADMIN,SERVICE,VIEWER

        # ---- Auth Service (public) ----
        - id: auth-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/auth/**

        # ---- EOD Service ----
        - id: eod-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/eod/**
            - Method=POST
          metadata:
            required-roles: ADMIN,SERVICE

# ---- Security ----
gateway:
  security:
    jwt:
      enabled: true
      secret: "payment-gateway-secret-key-must-be-at-least-256-bits-long-for-hs256"
      issuer: payment-gateway
      expiration-ms: 3600000
    api-key:
      enabled: true
      header-name: X-API-Key
      keys:
        pk_live_deposit_service_2024:
          name: deposit-service
          roles: [SERVICE, OPERATOR]
          allowed-paths: ["/api/**"]
        pk_live_admin_2024:
          name: admin-console
          roles: [ADMIN]
          allowed-paths: ["/**"]
    public-paths:
      - /actuator/**
      - /api/v1/auth/**
      - /gateway/features
      - /fallback/**

  feature-flags:
    enabled: true
    flags:
      deposits:
        enabled: true
        description: Deposit operations
        percentage: 100
      transfers:
        enabled: true
        description: Transfer operations
        percentage: 100
      eod:
        enabled: true
        description: EOD accrual
        allowed-roles: [ADMIN, SERVICE]
        percentage: 100

  rate-limit:
    enabled: true
    requests-per-minute: 100

# ---- Resilience4j ----
resilience4j:
  circuitbreaker:
    instances:
      deposit-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      transfer-cb:
        sliding-window-size: 20
        failure-rate-threshold: 40
        wait-duration-in-open-state: 60s
  timelimiter:
    instances:
      deposit-cb:
        timeout-duration: 10s
      transfer-cb:
        timeout-duration: 15s

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

logging:
  level:
    org.tars.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
