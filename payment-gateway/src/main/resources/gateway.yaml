# ============================================================
# Payment Gateway Configuration
# ============================================================

server:
  port: 8080
  bossThreads: 1
  workerThreads: 0  # 0 = auto (cores * 2)
  maxContentLength: 10485760  # 10MB
  idleTimeoutSeconds: 60
  enableAccessLog: true

# ============================================================
# Security Configuration
# ============================================================
security:
  jwt:
    enabled: true
    secret: "payment-gateway-secret-key-must-be-at-least-256-bits-long-for-hs256"
    issuer: "payment-gateway"
    expirationMs: 3600000  # 1 hour
    headerName: "Authorization"
    tokenPrefix: "Bearer "

  apiKey:
    enabled: true
    headerName: "X-API-Key"
    keys:
      "pk_live_deposit_service_key_2024":
        name: "deposit-service"
        roles: ["SERVICE", "OPERATOR"]
        allowedPaths: ["/api/**"]
        rateLimit: 5000
      "pk_live_admin_key_2024":
        name: "admin-console"
        roles: ["ADMIN"]
        allowedPaths: ["/**"]
        rateLimit: 1000
      "pk_live_mobile_key_2024":
        name: "mobile-app"
        roles: ["VIEWER"]
        allowedPaths: ["/api/v1/**"]
        rateLimit: 200

  cors:
    enabled: true
    allowedOrigins: ["*"]
    allowedMethods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allowedHeaders: ["*"]
    allowCredentials: false
    maxAge: 3600

  publicPaths:
    - "/health"
    - "/gateway/health"
    - "/gateway/metrics"
    - "/api/v1/auth/**"

# ============================================================
# Rate Limiting
# ============================================================
rateLimit:
  enabled: true
  defaultRpm: 100
  pathLimits:
    "/api/v1/deposits": 50
    "/api/v1/transfers": 30
    "/api/v1/auth": 20

# ============================================================
# Feature Flags
# ============================================================
featureFlags:
  enabled: true
  flags:
    deposits:
      enabled: true
      description: "Deposit operations"
      allowedRoles: []
      percentage: 100
    transfers:
      enabled: true
      description: "Transfer operations (deposit-to-card, card-to-deposit)"
      allowedRoles: []
      percentage: 100
    eod:
      enabled: true
      description: "End of day accrual processing"
      allowedRoles: ["ADMIN", "SERVICE"]
      percentage: 100
    deposit-to-deposit:
      enabled: true
      description: "Deposit to deposit transfers"
      allowedRoles: ["OPERATOR", "ADMIN"]
      percentage: 100
    new-deposit-product:
      enabled: false
      description: "New deposit product (not yet released)"
      allowedRoles: ["ADMIN"]
      percentage: 10

# ============================================================
# Routes
# ============================================================
routes:
  # Deposit Service
  - id: "deposit-service"
    path: "/api/v1/deposits/**"
    method: "*"
    loadBalancer: "round-robin"
    requiredRoles: ["OPERATOR", "ADMIN", "SERVICE"]
    timeoutMs: 30000
    retries: 2
    stripPrefix: false
    upstreams:
      - url: "http://localhost:8081"
        weight: 3
        version: "v1"
      - url: "http://localhost:8082"
        weight: 1
        version: "v2"
    versioning:
      strategy: "header"
      headerName: "X-API-Version"
      percentages:
        v1: 80
        v2: 20
    circuitBreaker:
      failureRateThreshold: 50
      waitDurationInOpenState: 30000
      slidingWindowSize: 10
    addHeaders:
      X-Service-Name: "deposit"

  # Transfer Service
  - id: "transfer-service"
    path: "/api/v1/transfers/**"
    method: "*"
    loadBalancer: "weighted"
    requiredRoles: ["OPERATOR", "ADMIN", "SERVICE"]
    timeoutMs: 45000
    retries: 3
    upstreams:
      - url: "http://localhost:8083"
        weight: 5
        version: "v1"
      - url: "http://localhost:8084"
        weight: 2
        version: "v1"
    circuitBreaker:
      failureRateThreshold: 40
      waitDurationInOpenState: 60000
      slidingWindowSize: 20

  # Account/Ledger Service
  - id: "account-service"
    path: "/api/v1/accounts/**"
    method: "*"
    loadBalancer: "least-connections"
    requiredRoles: ["OPERATOR", "ADMIN", "SERVICE", "VIEWER"]
    timeoutMs: 15000
    retries: 2
    upstreams:
      - url: "http://localhost:8085"
        weight: 1
      - url: "http://localhost:8086"
        weight: 1

  # Notification Service
  - id: "notification-service"
    path: "/api/v1/notifications/**"
    method: "*"
    loadBalancer: "round-robin"
    requiredRoles: ["SERVICE", "ADMIN"]
    timeoutMs: 10000
    retries: 1
    upstreams:
      - url: "http://localhost:8087"

  # EOD Processing
  - id: "eod-service"
    path: "/api/v1/eod/**"
    method: "POST"
    loadBalancer: "round-robin"
    requiredRoles: ["ADMIN", "SERVICE"]
    timeoutMs: 120000
    retries: 0
    upstreams:
      - url: "http://localhost:8088"

  # Auth Service (public)
  - id: "auth-service"
    path: "/api/v1/auth/**"
    method: "*"
    loadBalancer: "round-robin"
    timeoutMs: 10000
    retries: 1
    upstreams:
      - url: "http://localhost:8089"

# ============================================================
# Metrics
# ============================================================
metrics:
  enabled: true
  path: "/gateway/metrics"

